<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            color: aqua;
            text-decoration: underline dotted blueviolet
        }

        .text {
            color: darksalmon;
            border: 1px solid darkseagreen
        }

        #mytext {
            background-color: blue;
            color: yellow;
            font-weight: bold;
        }

        h3 {
            color: blue;

        }

        .myclass {
            color: brown
        }

        #myid {
            color: coral;
        }
    </style>
</head>

<body>
    <h1 style="color:rgb(255, 0, 238); font-size:60px">Inline CSS is used to style individual tag only</h1>
    <h2>internal css is used to style multiple tags at once</h2>
    <h2 class="text">name selector is used to select elements by their tag name</h2>
    <p class="text">class selector is used to select elements by their class name</p>
    <p id="mytext">ID selector is used to select elements by their id name</p>
    <h3 class="myclass" id="myid">selector priority</h3>
    <button  class="btn">Submit</button>
</body>

</html>
